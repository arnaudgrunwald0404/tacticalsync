<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock circle -->
  <circle cx="20" cy="20" r="18" fill="white" stroke="#4A5D5F" stroke-width="2"/>

  <!-- 15-minute highlighted section (12 to 3) -->
  <path d="M 20 20 L 20 2 A 18 18 0 0 1 38 20 Z" fill="#B89A6B" opacity="0.3"/>
  <path d="M 20 20 L 20 2 A 18 18 0 0 1 38 20 Z" fill="none" stroke="#B89A6B" stroke-width="2"/>

  <!-- Hour markers (12, 3, 6, 9) -->
  <circle cx="20" cy="5"  r="2" fill="#4A5D5F"/>
  <circle cx="35" cy="20" r="2" fill="#4A5D5F"/>
  <circle cx="20" cy="35" r="2" fill="#4A5D5F"/>
  <circle cx="5"  cy="20" r="2" fill="#4A5D5F"/>

  <!-- Minor markers -->
  <circle cx="26.5" cy="7.5"  r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="32.5" cy="13.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="32.5" cy="26.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="26.5" cy="32.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="13.5" cy="32.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="7.5"  cy="26.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="7.5"  cy="13.5" r="1" fill="#4A5D5F" opacity="0.4"/>
  <circle cx="13.5" cy="7.5"  r="1" fill="#4A5D5F" opacity="0.4"/>

  <!-- Center -->
  <circle cx="20" cy="20" r="2.5" fill="#4A5D5F"/>

  <!-- Minute hand (12) -->
  <line x1="20" y1="20" x2="20" y2="9"  stroke="#4A5D5F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand (3) -->
  <line x1="20" y1="20" x2="30" y2="20" stroke="#B89A6B" stroke-width="3"   stroke-linecap="round"/>
</svg>
