[auth]
site_url = "http://localhost:8089"
additional_redirect_urls = ["http://localhost:8089", "http://localhost:8080"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.github]
enabled = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[functions.save-google-calendar-tokens]
verify_jwt = true

[functions.google-calendar-sync]
verify_jwt = true

[functions.disconnect-google-calendar]
verify_jwt = true

[functions.exchange-zoom-token]
verify_jwt = true

[functions.zoom-recordings-sync]
verify_jwt = true

[functions.disconnect-zoom]
verify_jwt = true

[functions.generate-weekend-banner]
verify_jwt = true